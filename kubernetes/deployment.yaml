apiVersion: apps/v1
kind: Deployment
metadata:
  name: clicknbuy
  namespace: clicknbuy-ns
  labels:
    app: clicknbuy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clicknbuy
  template:
    metadata:
      labels:
        app: clicknbuy
    spec:
      containers:
        - name: clicknbuy
          image: ghcr.io/jenith-datatemplate/clicknbuy:v1.0.41
          imagePullPolicy: Always
          ports:
            - containerPort: 5454
          resources:
            limits:
              cpu: "1"
              memory: "768Mi"
            requests:
              cpu: "0.5"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5454
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5454
            initialDelaySeconds: 60
            periodSeconds: 5
      imagePullSecrets:
        - name: github-container-registry
