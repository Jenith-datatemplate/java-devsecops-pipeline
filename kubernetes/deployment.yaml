apiVersion: apps/v1
kind: Deployment
metadata:
  name: clicknbuy
  labels:
    app: clicknbuy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clicknbuy
  template:
    metadata:
      labels:
        app: clicknbuy
    spec:
      containers:
        - name: clicknbuy
          image: ghcr.io/jenith-datatemplate/java-devsecops-pipeline:sha-596a0fb73338799e4a4f0e2570e732793bcc039c
          imagePullPolicy: Always
          ports:
            - containerPort: 5454
          envFrom:
            - secretRef:
                name: clicknbuy-secrets
          resources:
            limits:
              cpu: "1"
              memory: "768Mi"
            requests:
              cpu: "0.5"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 5454
            initialDelaySeconds: 90
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 5454
            initialDelaySeconds: 60
            periodSeconds: 5
      imagePullSecrets:
        - name: github-container-registry
