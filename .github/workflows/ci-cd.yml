name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'kubernetes/deployment.yaml'
  pull_request:
    branches: [ main ]

jobs:

  sonarqube:
    name: SonarQube Scan
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: SonarQube scan
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey=ClickNBuy \
            -Dsonar.projectName=ClickNBuy \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -DskipTests=true \
            -B
        continue-on-error: true

  build:
    name: Build JAR
    runs-on: self-hosted
    needs: [sonarqube]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build JAR
        run: mvn clean package -DskipTests -B
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  docker:
    name: Docker Build and Push
    runs-on: self-hosted
    needs: [build]
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: jenith-datatemplate/clicknbuy
    outputs:
      image_tag: ${{ steps.set_output.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}

      - name: Generate build number
        id: buildnumber
        run: echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=v1.0.${{ github.run_number }}
            type=raw,value=latest

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set image tag output
        id: set_output
        run: echo "image_tag=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

  update-k8s:
    name: Update Kubernetes Deployment
    runs-on: self-hosted
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
      - name: Setup Git config
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      - name: Update Kubernetes deployment file
        env:
          IMAGE_TAG: v1.0.${{ github.run_number }}
        run: |
          NEW_IMAGE="ghcr.io/jenith-datatemplate/clicknbuy:${IMAGE_TAG}"
          sed -i "s|image: ghcr.io/jenith-datatemplate/.*|image: ${NEW_IMAGE}|g" kubernetes/deployment.yaml
          echo "Updated image to: ${NEW_IMAGE}"
          grep "image:" kubernetes/deployment.yaml
      - name: Commit and push changes
        run: |
          git add kubernetes/deployment.yaml
          git commit -m "Update deployment image tag: ${{ needs.docker.outputs.image_tag }} [skip ci]" || echo "No changes to commit"
          git push

  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: [update-k8s]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull latest deployment.yaml
        run: git pull origin main || true

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f kubernetes/deployment.yaml -n clicknbuy-ns
          kubectl rollout restart deployment clicknbuy -n clicknbuy-ns
          kubectl rollout status deployment clicknbuy -n clicknbuy-ns --timeout=300s
          echo "Deployment successful!"

      - name: Verify deployment
        run: |
          kubectl get pods -n clicknbuy-ns
          kubectl get services -n clicknbuy-ns
