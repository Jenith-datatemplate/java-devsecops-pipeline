spring.application.name=ClickNBuy
server.port=5454

# H2 In-memory Database
spring.datasource.url=jdbc:h2:mem:clicknbuydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# Disable mail/external services
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@gmail.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Cloudinary/Twilio/Razorpay placeholders
cloudinary.url=cloudinary://test:test@test
twilio.sid=test
twilio.auth.token=test
twilio.mobile=1234567890
razorpay.id=test
razorpay.secret=test
